name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check code quality
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Build package
        run: bun run build

      - name: Run tests
        run: bun test